version: v2

modules:
  - path: proto
    name: buf.build/agynio/api

deps:
  - buf.build/opentelemetry/opentelemetry

lint:
  use:
    - STANDARD
  except:
    - RPC_REQUEST_RESPONSE_UNIQUE
    - SERVICE_SUFFIX
breaking:
  use:
    - FILE
  ignore_only:
    FILE_NO_DELETE:
      - proto/agynio/api/gateway/v1/tracing.proto
      - proto/agynio/api/tenants/v1/tenants.proto
      - proto/agynio/api/gateway/v1/llm.proto
    RPC_NO_DELETE:
      - proto/agynio/api/llm/v1/llm.proto
    MESSAGE_NO_DELETE:
      - proto/agynio/api/llm/v1/llm.proto
    FIELD_NO_DELETE:
      - proto/agynio/api/ziti_management/v1/ziti_management.proto
      - proto/agynio/api/runner/v1/runner.proto
    FIELD_NO_DELETE_UNLESS_NUMBER_RESERVED:
      - proto/agynio/api/ziti_management/v1/ziti_management.proto
    FIELD_NO_DELETE_UNLESS_NAME_RESERVED:
      - proto/agynio/api/ziti_management/v1/ziti_management.proto
    ENUM_NO_DELETE:
      - proto/agynio/api/ziti_management/v1/ziti_management.proto
    ENUM_VALUE_NO_DELETE:
      - proto/agynio/api/identity/v1/identity.proto
      - proto/agynio/api/ziti_management/v1/ziti_management.proto
    FIELD_SAME_TYPE:
      - proto/agynio/api/ziti_management/v1/ziti_management.proto
