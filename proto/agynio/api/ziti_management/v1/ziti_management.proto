syntax = "proto3";

package agynio.api.ziti_management.v1;

import "agynio/api/identity/v1/identity.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/ziti_management/v1;zitimanagementv1";

service ZitiManagementService {
  // Orchestrator -> create OpenZiti identity for an agent, return enrollment JWT.
  rpc CreateAgentIdentity(CreateAgentIdentityRequest) returns (CreateAgentIdentityResponse);

  // Apps Service -> create and enroll an OpenZiti identity for an app. If a previous
  // identity exists, deletes it first. Returns enrolled credentials.
  rpc CreateAppIdentity(CreateAppIdentityRequest) returns (CreateAppIdentityResponse);

  // Runners Service, Apps Service -> create a per-runner or per-app OpenZiti service.
  rpc CreateService(CreateServiceRequest) returns (CreateServiceResponse);

  // Orchestrator -> delete OpenZiti identity and its platform mapping.
  rpc DeleteIdentity(DeleteIdentityRequest) returns (DeleteIdentityResponse);

  // Apps Service -> delete an app's OpenZiti identity and its associated service.
  // Looked up by platform identity_id.
  rpc DeleteAppIdentity(DeleteAppIdentityRequest) returns (DeleteAppIdentityResponse);

  // Runners Service -> create and enroll an OpenZiti identity for a runner. If a previous
  // identity exists, deletes it first. Returns enrolled credentials.
  rpc CreateRunnerIdentity(CreateRunnerIdentityRequest) returns (CreateRunnerIdentityResponse);
  // Runners Service -> delete a runner's OpenZiti identity and its associated service.
  // Looked up by platform identity_id.
  rpc DeleteRunnerIdentity(DeleteRunnerIdentityRequest) returns (DeleteRunnerIdentityResponse);

  // Orchestrator -> list all platform-managed identities (orphan reconciliation).
  rpc ListManagedIdentities(ListManagedIdentitiesRequest) returns (ListManagedIdentitiesResponse);

  // Gateway -> map OpenZiti identity ID to platform identity (hot path).
  rpc ResolveIdentity(ResolveIdentityRequest) returns (ResolveIdentityResponse);

  // Infrastructure services (Gateway, Orchestrator, Runner) -> request an enrolled
  // OpenZiti identity for the calling service. Ziti Management creates the identity
  // on the Controller, enrolls it (generates key pair, submits CSR, receives cert),
  // and returns the enrolled identity to the caller.
  rpc RequestServiceIdentity(RequestServiceIdentityRequest) returns (RequestServiceIdentityResponse);

  // Infrastructure services -> extend the lease on a service identity.
  // Called periodically by the service to prevent GC from deleting the identity.
  rpc ExtendIdentityLease(ExtendIdentityLeaseRequest) returns (ExtendIdentityLeaseResponse);
}

enum ServiceType {
  SERVICE_TYPE_UNSPECIFIED = 0;
  SERVICE_TYPE_GATEWAY = 1;
  SERVICE_TYPE_ORCHESTRATOR = 2;
  SERVICE_TYPE_LLM_PROXY = 4;
  reserved 3;
  reserved "SERVICE_TYPE_RUNNER";
}

message ManagedIdentity {
  string ziti_identity_id = 1;
  string identity_id = 2;
  agynio.api.identity.v1.IdentityType identity_type = 3;
  string ziti_service_id = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreateAgentIdentityRequest {
  string agent_id = 1;
}

message CreateAgentIdentityResponse {
  string ziti_identity_id = 1;
  string enrollment_jwt = 2;
}

// Request to create and enroll an OpenZiti identity for an app.
message CreateAppIdentityRequest {
  string identity_id = 1;
  string slug = 2;
}

// Response with enrolled OpenZiti credentials for an app identity.
message CreateAppIdentityResponse {
  string ziti_identity_id = 1;
  bytes identity_json = 2;
  reserved 3;
  reserved "ziti_service_id";
}

message CreateServiceRequest {
  // e.g. "runner-{runnerId}" or "app-{slug}"
  string name = 1;
  // e.g. ["runner-services"] or ["app-services"]
  repeated string role_attributes = 2;
}

message CreateServiceResponse {
  // The OpenZiti service ID
  string ziti_service_id = 1;
  // The service name (echoed back)
  string ziti_service_name = 2;
}

// Request to delete an app's OpenZiti identity and service by platform identity_id.
message DeleteAppIdentityRequest {
  // Platform app identity UUID - for looking up managed identity
  string identity_id = 1;
  // OpenZiti service ID - for deleting the OpenZiti service
  string ziti_service_id = 2;
}

// Response after deleting an app's OpenZiti identity.
message DeleteAppIdentityResponse {}

message CreateRunnerIdentityRequest {
  string runner_id = 1;
  repeated string role_attributes = 2;
}

message CreateRunnerIdentityResponse {
  string ziti_identity_id = 1;
  bytes identity_json = 2;
  reserved 3;
  reserved 4;
  reserved "ziti_service_id";
  reserved "ziti_service_name";
}

message DeleteRunnerIdentityRequest {
  // Platform runner UUID - for looking up managed identity
  string identity_id = 1;
  // OpenZiti service ID - for deleting the OpenZiti service
  string ziti_service_id = 2;
}

message DeleteRunnerIdentityResponse {}

message DeleteIdentityRequest {
  string ziti_identity_id = 1;
}

message DeleteIdentityResponse {}

message ListManagedIdentitiesRequest {
  agynio.api.identity.v1.IdentityType identity_type = 1;
  int32 page_size = 3;
  string page_token = 4;
}

message ListManagedIdentitiesResponse {
  repeated ManagedIdentity identities = 1;
  string next_page_token = 2;
}

message ResolveIdentityRequest {
  string ziti_identity_id = 1;
}

message ResolveIdentityResponse {
  string identity_id = 1;
  agynio.api.identity.v1.IdentityType identity_type = 2;
}

message RequestServiceIdentityRequest {
  // Which infrastructure service is requesting the identity.
  ServiceType service_type = 1;
}

message RequestServiceIdentityResponse {
  // The OpenZiti identity ID (for lease extension and cleanup).
  string ziti_identity_id = 1;
  // The full enrolled identity JSON (contains cert, key, CA, controller URL).
  // The caller writes this to ephemeral disk and loads it via the OpenZiti SDK.
  bytes identity_json = 2;
}

message ExtendIdentityLeaseRequest {
  // The OpenZiti identity ID whose lease should be extended.
  string ziti_identity_id = 1;
}

message ExtendIdentityLeaseResponse {}
