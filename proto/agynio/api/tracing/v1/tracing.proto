syntax = "proto3";

package agynio.api.tracing.v1;

option go_package = "github.com/agynio/api/gen/agynio/api/tracing/v1;tracingv1";

// TracingService provides query access to span data ingested via the standard
// OTLP TraceService/Export endpoint. It supports paginated listing with
// filters, single-span lookup, and full-trace retrieval.
service TracingService {
  // List spans matching the provided filters with pagination.
  rpc ListSpans(ListSpansRequest) returns (ListSpansResponse);

  // Get a single span by trace_id and span_id.
  rpc GetSpan(GetSpanRequest) returns (GetSpanResponse);

  // Get all spans belonging to a trace.
  rpc GetTrace(GetTraceRequest) returns (GetTraceResponse);
}

// ===========================================================================
// Enums
// ===========================================================================

// Kind of span. Mirrors the OpenTelemetry SpanKind definition.
enum SpanKind {
  SPAN_KIND_UNSPECIFIED = 0;
  SPAN_KIND_INTERNAL = 1;
  SPAN_KIND_SERVER = 2;
  SPAN_KIND_CLIENT = 3;
  SPAN_KIND_PRODUCER = 4;
  SPAN_KIND_CONSUMER = 5;
}

// Status code of a span. Mirrors the OpenTelemetry StatusCode definition.
enum StatusCode {
  STATUS_CODE_UNSPECIFIED = 0;
  STATUS_CODE_OK = 1;
  STATUS_CODE_ERROR = 2;
}

// Ordering for ListSpans results.
enum ListSpansOrderBy {
  LIST_SPANS_ORDER_BY_UNSPECIFIED = 0;
  LIST_SPANS_ORDER_BY_START_TIME_DESC = 1;
  LIST_SPANS_ORDER_BY_START_TIME_ASC = 2;
}

// ===========================================================================
// Shared value types (mirrors OpenTelemetry common/v1)
// ===========================================================================

// A key-value pair. Mirrors opentelemetry.proto.common.v1.KeyValue.
message KeyValue {
  string key = 1;
  AnyValue value = 2;
}

// A value that can hold one of several types.
// Mirrors opentelemetry.proto.common.v1.AnyValue.
message AnyValue {
  oneof value {
    string string_value = 1;
    bool bool_value = 2;
    int64 int_value = 3;
    double double_value = 4;
    ArrayValue array_value = 5;
    KeyValueList kvlist_value = 6;
    bytes bytes_value = 7;
  }
}

// An array of AnyValue. Mirrors opentelemetry.proto.common.v1.ArrayValue.
message ArrayValue {
  repeated AnyValue values = 1;
}

// A list of KeyValue pairs. Mirrors opentelemetry.proto.common.v1.KeyValueList.
message KeyValueList {
  repeated KeyValue values = 1;
}

// ===========================================================================
// Span sub-messages
// ===========================================================================

// Status of a span. Mirrors opentelemetry.proto.trace.v1.Status.
message Status {
  string message = 1;
  StatusCode code = 2;
}

// A timestamped event within a span. Mirrors opentelemetry.proto.trace.v1.Span.Event.
message Event {
  fixed64 time_unix_nano = 1;
  string name = 2;
  repeated KeyValue attributes = 3;
  uint32 dropped_attributes_count = 4;
}

// A link to another span. Mirrors opentelemetry.proto.trace.v1.Span.Link.
message Link {
  bytes trace_id = 1;   // 16 bytes
  bytes span_id = 2;    // 8 bytes
  string trace_state = 3;
  repeated KeyValue attributes = 4;
  uint32 dropped_attributes_count = 5;
  uint32 flags = 6;
}

// Resource metadata associated with a span.
// Mirrors opentelemetry.proto.resource.v1.Resource.
message Resource {
  repeated KeyValue attributes = 1;
  uint32 dropped_attributes_count = 2;
}

// InstrumentationScope metadata associated with a span.
// Mirrors opentelemetry.proto.common.v1.InstrumentationScope.
message InstrumentationScope {
  string name = 1;
  string version = 2;
  repeated KeyValue attributes = 3;
  uint32 dropped_attributes_count = 4;
}

// ===========================================================================
// Span entity
// ===========================================================================

// A span represents a single operation within a trace.
// Data model follows the OpenTelemetry Span specification.
message Span {
  bytes trace_id = 1;           // 16 bytes — trace identifier
  bytes span_id = 2;            // 8 bytes — span identifier
  string trace_state = 3;       // W3C trace-context trace state
  bytes parent_span_id = 4;     // 8 bytes — parent span (empty for root)
  uint32 flags = 5;             // W3C trace flags + OTel span flags
  string name = 6;              // operation name
  SpanKind kind = 7;
  fixed64 start_time_unix_nano = 8;  // nanoseconds since epoch
  fixed64 end_time_unix_nano = 9;    // 0 = in-progress
  repeated KeyValue attributes = 10;
  repeated Event events = 11;
  repeated Link links = 12;
  Status status = 13;
  uint32 dropped_attributes_count = 14;
  uint32 dropped_events_count = 15;
  uint32 dropped_links_count = 16;
  Resource resource = 17;
  InstrumentationScope instrumentation_scope = 18;
}

// ===========================================================================
// ListSpans
// ===========================================================================

// Filter criteria for ListSpans. All fields are optional and AND-combined.
message SpanFilter {
  bytes trace_id = 1;              // filter by trace
  bytes parent_span_id = 2;        // filter by parent span
  string name = 3;                 // filter by operation name (exact match)
  SpanKind kind = 4;               // filter by span kind
  fixed64 start_time_min = 5;      // start time lower bound (inclusive, nanos)
  fixed64 start_time_max = 6;      // start time upper bound (inclusive, nanos)
  optional bool in_progress = 7;   // true = only in-progress, false = only completed, unset = both
}

message ListSpansRequest {
  SpanFilter filter = 1;
  int32 page_size = 2;
  string page_token = 3;
  ListSpansOrderBy order_by = 4;   // default: START_TIME_DESC
}

message ListSpansResponse {
  repeated Span spans = 1;
  string next_page_token = 2;
}

// ===========================================================================
// GetSpan
// ===========================================================================

message GetSpanRequest {
  bytes trace_id = 1;   // 16 bytes
  bytes span_id = 2;    // 8 bytes
}

message GetSpanResponse {
  Span span = 1;
}

// ===========================================================================
// GetTrace
// ===========================================================================

message GetTraceRequest {
  bytes trace_id = 1;   // 16 bytes
}

message GetTraceResponse {
  repeated Span spans = 1;
}
