syntax = "proto3";

package agynio.api.gateway.v1;

import "agynio/api/users/v1/users.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/gateway/v1;gatewayv1";

service UsersGateway {
  // --- Current User ---
  rpc GetMe(agynio.api.users.v1.GetMeRequest) returns (agynio.api.users.v1.GetMeResponse);
  rpc UpdateMe(agynio.api.users.v1.UpdateMeRequest) returns (agynio.api.users.v1.UpdateMeResponse);

  // --- User Directory ---
  rpc SearchUsers(agynio.api.users.v1.SearchUsersRequest) returns (agynio.api.users.v1.SearchUsersResponse);

  // --- Admin User Management ---
  rpc CreateUser(agynio.api.users.v1.CreateUserRequest) returns (agynio.api.users.v1.CreateUserResponse);
  rpc GetUser(agynio.api.users.v1.GetUserRequest) returns (agynio.api.users.v1.GetUserResponse);
  rpc ListUsers(agynio.api.users.v1.ListUsersRequest) returns (agynio.api.users.v1.ListUsersResponse);
  rpc UpdateUser(agynio.api.users.v1.UpdateUserRequest) returns (agynio.api.users.v1.UpdateUserResponse);
  rpc DeleteUser(agynio.api.users.v1.DeleteUserRequest) returns (agynio.api.users.v1.DeleteUserResponse);

  // --- API Tokens ---
  rpc CreateAPIToken(agynio.api.users.v1.CreateAPITokenRequest) returns (agynio.api.users.v1.CreateAPITokenResponse);
  rpc ListAPITokens(agynio.api.users.v1.ListAPITokensRequest) returns (agynio.api.users.v1.ListAPITokensResponse);
  rpc RevokeAPIToken(agynio.api.users.v1.RevokeAPITokenRequest) returns (agynio.api.users.v1.RevokeAPITokenResponse);
  rpc BatchGetUsers(agynio.api.users.v1.BatchGetUsersRequest) returns (agynio.api.users.v1.BatchGetUsersResponse);

  // --- Devices ---
  rpc CreateDevice(agynio.api.users.v1.CreateDeviceRequest) returns (agynio.api.users.v1.CreateDeviceResponse);
  rpc ListDevices(agynio.api.users.v1.ListDevicesRequest) returns (agynio.api.users.v1.ListDevicesResponse);
  rpc DeleteDevice(agynio.api.users.v1.DeleteDeviceRequest) returns (agynio.api.users.v1.DeleteDeviceResponse);
}
