syntax = "proto3";

package agynio.api.gateway.v1;

import "agynio/api/secrets/v1/secrets.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/gateway/v1;gatewayv1";

service SecretsGateway {
  // --- Secret Providers ---
  rpc CreateSecretProvider(agynio.api.secrets.v1.CreateSecretProviderRequest) returns (agynio.api.secrets.v1.CreateSecretProviderResponse);
  rpc GetSecretProvider(agynio.api.secrets.v1.GetSecretProviderRequest) returns (agynio.api.secrets.v1.GetSecretProviderResponse);
  rpc UpdateSecretProvider(agynio.api.secrets.v1.UpdateSecretProviderRequest) returns (agynio.api.secrets.v1.UpdateSecretProviderResponse);
  rpc DeleteSecretProvider(agynio.api.secrets.v1.DeleteSecretProviderRequest) returns (agynio.api.secrets.v1.DeleteSecretProviderResponse);
  rpc ListSecretProviders(agynio.api.secrets.v1.ListSecretProvidersRequest) returns (agynio.api.secrets.v1.ListSecretProvidersResponse);

  // --- Secrets ---
  rpc CreateSecret(agynio.api.secrets.v1.CreateSecretRequest) returns (agynio.api.secrets.v1.CreateSecretResponse);
  rpc GetSecret(agynio.api.secrets.v1.GetSecretRequest) returns (agynio.api.secrets.v1.GetSecretResponse);
  rpc UpdateSecret(agynio.api.secrets.v1.UpdateSecretRequest) returns (agynio.api.secrets.v1.UpdateSecretResponse);
  rpc DeleteSecret(agynio.api.secrets.v1.DeleteSecretRequest) returns (agynio.api.secrets.v1.DeleteSecretResponse);
  rpc ListSecrets(agynio.api.secrets.v1.ListSecretsRequest) returns (agynio.api.secrets.v1.ListSecretsResponse);

  // --- Resolution ---
  rpc ResolveSecret(agynio.api.secrets.v1.ResolveSecretRequest) returns (agynio.api.secrets.v1.ResolveSecretResponse);
}
