syntax = "proto3";

package agynio.api.gateway.v1;

import "agynio/api/organizations/v1/organizations.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/gateway/v1;gatewayv1";

service OrganizationsGateway {
  // --- Organizations ---
  rpc CreateOrganization(agynio.api.organizations.v1.CreateOrganizationRequest) returns (agynio.api.organizations.v1.CreateOrganizationResponse);
  rpc GetOrganization(agynio.api.organizations.v1.GetOrganizationRequest) returns (agynio.api.organizations.v1.GetOrganizationResponse);
  rpc UpdateOrganization(agynio.api.organizations.v1.UpdateOrganizationRequest) returns (agynio.api.organizations.v1.UpdateOrganizationResponse);
  rpc DeleteOrganization(agynio.api.organizations.v1.DeleteOrganizationRequest) returns (agynio.api.organizations.v1.DeleteOrganizationResponse);
  rpc ListOrganizations(agynio.api.organizations.v1.ListOrganizationsRequest) returns (agynio.api.organizations.v1.ListOrganizationsResponse);
  rpc ListAccessibleOrganizations(agynio.api.organizations.v1.ListAccessibleOrganizationsRequest) returns (agynio.api.organizations.v1.ListAccessibleOrganizationsResponse);

  // --- Members Management ---
  rpc CreateMembership(agynio.api.organizations.v1.CreateMembershipRequest) returns (agynio.api.organizations.v1.CreateMembershipResponse);
  rpc AcceptMembership(agynio.api.organizations.v1.AcceptMembershipRequest) returns (agynio.api.organizations.v1.AcceptMembershipResponse);
  rpc DeclineMembership(agynio.api.organizations.v1.DeclineMembershipRequest) returns (agynio.api.organizations.v1.DeclineMembershipResponse);
  rpc RemoveMembership(agynio.api.organizations.v1.RemoveMembershipRequest) returns (agynio.api.organizations.v1.RemoveMembershipResponse);
  rpc UpdateMembershipRole(agynio.api.organizations.v1.UpdateMembershipRoleRequest) returns (agynio.api.organizations.v1.UpdateMembershipRoleResponse);
  rpc ListMembers(agynio.api.organizations.v1.ListMembersRequest) returns (agynio.api.organizations.v1.ListMembersResponse);
  rpc ListMyMemberships(agynio.api.organizations.v1.ListMyMembershipsRequest) returns (agynio.api.organizations.v1.ListMyMembershipsResponse);

  // --- Org Nicknames ---
  rpc SetMyOrgNickname(agynio.api.organizations.v1.SetMyOrgNicknameRequest) returns (agynio.api.organizations.v1.SetMyOrgNicknameResponse);
}
