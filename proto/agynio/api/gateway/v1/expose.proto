syntax = "proto3";

package agynio.api.gateway.v1;

import "agynio/api/expose/v1/expose.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/gateway/v1;gatewayv1";

message AddExposureForCallerRequest {
  int32 port = 1;
}

message AddExposureForCallerResponse {
  agynio.api.expose.v1.Exposure exposure = 1;
}

message RemoveExposureForCallerRequest {
  int32 port = 1;
}

message RemoveExposureForCallerResponse {}

message ListExposuresForCallerRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListExposuresForCallerResponse {
  repeated agynio.api.expose.v1.Exposure exposures = 1;
  string next_page_token = 2;
}

service ExposeGateway {
  // Expose a port on an agent workload.
  rpc AddExposure(agynio.api.expose.v1.AddExposureRequest) returns (agynio.api.expose.v1.AddExposureResponse);

  // Un-expose a port on an agent workload.
  rpc RemoveExposure(agynio.api.expose.v1.RemoveExposureRequest) returns (agynio.api.expose.v1.RemoveExposureResponse);

  // List active exposures for an agent workload.
  rpc ListExposures(agynio.api.expose.v1.ListExposuresRequest) returns (agynio.api.expose.v1.ListExposuresResponse);

  // Expose a port on the caller's agent workload.
  rpc AddExposureForCaller(AddExposureForCallerRequest) returns (AddExposureForCallerResponse);

  // Un-expose a port on the caller's agent workload.
  rpc RemoveExposureForCaller(RemoveExposureForCallerRequest) returns (RemoveExposureForCallerResponse);

  // List active exposures for the caller's agent workload.
  rpc ListExposuresForCaller(ListExposuresForCallerRequest) returns (ListExposuresForCallerResponse);
}
