syntax = "proto3";

package agynio.api.gateway.v1;

import "agynio/api/apps/v1/apps.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/gateway/v1;gatewayv1";

service AppsGateway {
  rpc CreateApp(agynio.api.apps.v1.CreateAppRequest) returns (agynio.api.apps.v1.CreateAppResponse);
  rpc UpdateApp(agynio.api.apps.v1.UpdateAppRequest) returns (agynio.api.apps.v1.UpdateAppResponse);
  rpc GetApp(agynio.api.apps.v1.GetAppRequest) returns (agynio.api.apps.v1.GetAppResponse);
  rpc GetAppProfile(agynio.api.apps.v1.GetAppProfileRequest) returns (agynio.api.apps.v1.GetAppProfileResponse);
  rpc GetAppBySlug(agynio.api.apps.v1.GetAppBySlugRequest) returns (agynio.api.apps.v1.GetAppBySlugResponse);
  rpc ListApps(agynio.api.apps.v1.ListAppsRequest) returns (agynio.api.apps.v1.ListAppsResponse);
  rpc DeleteApp(agynio.api.apps.v1.DeleteAppRequest) returns (agynio.api.apps.v1.DeleteAppResponse);
  rpc EnrollApp(agynio.api.apps.v1.EnrollAppRequest) returns (agynio.api.apps.v1.EnrollAppResponse);
  rpc InstallApp(agynio.api.apps.v1.InstallAppRequest) returns (agynio.api.apps.v1.InstallAppResponse);
  rpc GetInstallation(agynio.api.apps.v1.GetInstallationRequest) returns (agynio.api.apps.v1.GetInstallationResponse);
  rpc GetInstallationBySlug(agynio.api.apps.v1.GetInstallationBySlugRequest) returns (agynio.api.apps.v1.GetInstallationBySlugResponse);
  rpc ListInstallations(agynio.api.apps.v1.ListInstallationsRequest) returns (agynio.api.apps.v1.ListInstallationsResponse);
  rpc UpdateInstallation(agynio.api.apps.v1.UpdateInstallationRequest) returns (agynio.api.apps.v1.UpdateInstallationResponse);
  rpc UninstallApp(agynio.api.apps.v1.UninstallAppRequest) returns (agynio.api.apps.v1.UninstallAppResponse);
  rpc ReportInstallationStatus(agynio.api.apps.v1.ReportInstallationStatusRequest) returns (agynio.api.apps.v1.ReportInstallationStatusResponse);
  rpc AppendInstallationAuditLogEntry(agynio.api.apps.v1.AppendInstallationAuditLogEntryRequest) returns (agynio.api.apps.v1.AppendInstallationAuditLogEntryResponse);
  rpc ListInstallationAuditLogEntries(agynio.api.apps.v1.ListInstallationAuditLogEntriesRequest) returns (agynio.api.apps.v1.ListInstallationAuditLogEntriesResponse);
}
