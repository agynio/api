syntax = "proto3";

package agynio.api.gateway.v1;

import "agynio/api/llm/v1/llm.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/gateway/v1;gatewayv1";

service LLMGateway {
  rpc CreateResponse(agynio.api.llm.v1.CreateResponseRequest) returns (agynio.api.llm.v1.CreateResponseResponse);
  rpc CreateResponseStream(agynio.api.llm.v1.CreateResponseStreamRequest)
      returns (stream agynio.api.llm.v1.CreateResponseStreamResponse);
}
