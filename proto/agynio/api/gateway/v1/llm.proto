syntax = "proto3";

package agynio.api.gateway.v1;

import "agynio/api/llm/v1/llm.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/gateway/v1;gatewayv1";

service LLMGateway {
  // --- Providers ---
  rpc CreateLLMProvider(agynio.api.llm.v1.CreateLLMProviderRequest) returns (agynio.api.llm.v1.CreateLLMProviderResponse);
  rpc GetLLMProvider(agynio.api.llm.v1.GetLLMProviderRequest) returns (agynio.api.llm.v1.GetLLMProviderResponse);
  rpc UpdateLLMProvider(agynio.api.llm.v1.UpdateLLMProviderRequest) returns (agynio.api.llm.v1.UpdateLLMProviderResponse);
  rpc DeleteLLMProvider(agynio.api.llm.v1.DeleteLLMProviderRequest) returns (agynio.api.llm.v1.DeleteLLMProviderResponse);
  rpc ListLLMProviders(agynio.api.llm.v1.ListLLMProvidersRequest) returns (agynio.api.llm.v1.ListLLMProvidersResponse);

  // --- Models ---
  rpc CreateModel(agynio.api.llm.v1.CreateModelRequest) returns (agynio.api.llm.v1.CreateModelResponse);
  rpc GetModel(agynio.api.llm.v1.GetModelRequest) returns (agynio.api.llm.v1.GetModelResponse);
  rpc UpdateModel(agynio.api.llm.v1.UpdateModelRequest) returns (agynio.api.llm.v1.UpdateModelResponse);
  rpc DeleteModel(agynio.api.llm.v1.DeleteModelRequest) returns (agynio.api.llm.v1.DeleteModelResponse);
  rpc ListModels(agynio.api.llm.v1.ListModelsRequest) returns (agynio.api.llm.v1.ListModelsResponse);

  // --- Test ---
  rpc TestModel(agynio.api.llm.v1.TestModelRequest) returns (agynio.api.llm.v1.TestModelResponse);
}
