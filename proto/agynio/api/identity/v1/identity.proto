syntax = "proto3";

package agynio.api.identity.v1;

option go_package = "github.com/agynio/api/gen/agynio/api/identity/v1;identityv1";

// IdentityService provides the canonical registry of identity IDs and types.
service IdentityService {
  // RegisterIdentity stores a new identity ID and its type.
  // Returns ALREADY_EXISTS if the identity_id is already registered.
  rpc RegisterIdentity(RegisterIdentityRequest) returns (RegisterIdentityResponse);
  // GetIdentityType returns the type for a single identity ID.
  // Returns NOT_FOUND if the identity_id is unknown.
  rpc GetIdentityType(GetIdentityTypeRequest) returns (GetIdentityTypeResponse);
  // BatchGetIdentityTypes returns known identity types for the requested IDs.
  // Unknown identity IDs are omitted from the response.
  rpc BatchGetIdentityTypes(BatchGetIdentityTypesRequest) returns (BatchGetIdentityTypesResponse);
}

enum IdentityType {
  IDENTITY_TYPE_UNSPECIFIED = 0;
  IDENTITY_TYPE_USER = 1;
  IDENTITY_TYPE_AGENT = 2;
  IDENTITY_TYPE_CHANNEL = 3;
  IDENTITY_TYPE_RUNNER = 4;
  IDENTITY_TYPE_APP = 5;
}

message RegisterIdentityRequest {
  string identity_id = 1;
  IdentityType identity_type = 2;
}

message RegisterIdentityResponse {}

message GetIdentityTypeRequest {
  string identity_id = 1;
}

message GetIdentityTypeResponse {
  IdentityType identity_type = 1;
}

message BatchGetIdentityTypesRequest {
  repeated string identity_ids = 1;
}

message IdentityTypeEntry {
  string identity_id = 1;
  IdentityType identity_type = 2;
}

message BatchGetIdentityTypesResponse {
  repeated IdentityTypeEntry entries = 1;
}
