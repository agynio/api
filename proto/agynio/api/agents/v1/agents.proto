// ===========================================================================
// Env
// ===========================================================================

message Env {
  EntityMeta meta = 1;
  string name = 2;
  string description = 3;
  oneof target {
    string agent_id = 4;
    string mcp_id = 5;
    string hook_id = 6;
  }
  oneof source {
    string value = 7;
    string secret_id = 8; // UUID
  }
}

message CreateEnvRequest {
  string name = 1;
  string description = 2;
  oneof target {
    string agent_id = 3;
    string mcp_id = 4;
    string hook_id = 5;
  }
  oneof source {
    string value = 6;
    string secret_id = 7; // UUID
  }
}

message CreateEnvResponse {
  Env env = 1;
}

message GetEnvRequest {
  string id = 1; // UUID
}

message GetEnvResponse {
  Env env = 1;
}

message UpdateEnvRequest {
  string id = 1; // UUID
  optional string name = 2;
  optional string description = 3;
  optional string value = 4;
  optional string secret_id = 5;
}

message UpdateEnvResponse {
