message ListEnvsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string agent_id = 3;
  string mcp_id = 4;
  string hook_id = 5;
}

message ListEnvsResponse {
  repeated Env envs = 1;
  string next_page_token = 2;
}

