syntax = "proto3";

package agynio.api.agents.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/agynio/api/gen/agynio/api/agents/v1;agentsv1";

// AgentsService manages agent resources: agents, volumes, volume attachments,
// MCP servers, skills, hooks, environment variables, and init scripts.
//
// This is a control-plane service. It stores desired state;
// other services reconcile toward it.
service AgentsService {
  // --- Agents ---
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);
  // Resolve an agent and organization by identity ID.
  rpc ResolveAgentIdentity(ResolveAgentIdentityRequest) returns (ResolveAgentIdentityResponse);
  rpc UpdateAgent(UpdateAgentRequest) returns (UpdateAgentResponse);
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc SetAgentRole(SetAgentRoleRequest) returns (SetAgentRoleResponse);
  rpc RemoveAgentRole(RemoveAgentRoleRequest) returns (RemoveAgentRoleResponse);
  rpc ListAgentRoles(ListAgentRolesRequest) returns (ListAgentRolesResponse);
  rpc ListMyAgentRoles(ListMyAgentRolesRequest) returns (ListMyAgentRolesResponse);

  // --- Environments ---
  rpc CreateEnvironment(CreateEnvironmentRequest) returns (CreateEnvironmentResponse);
  rpc GetEnvironment(GetEnvironmentRequest) returns (GetEnvironmentResponse);
  rpc UpdateEnvironment(UpdateEnvironmentRequest) returns (UpdateEnvironmentResponse);
  rpc DeleteEnvironment(DeleteEnvironmentRequest) returns (DeleteEnvironmentResponse);
  rpc ListEnvironments(ListEnvironmentsRequest) returns (ListEnvironmentsResponse);

  // --- Sandboxes ---
  rpc CreateSandbox(CreateSandboxRequest) returns (CreateSandboxResponse);
  rpc GetSandbox(GetSandboxRequest) returns (GetSandboxResponse);
  rpc ListSandboxes(ListSandboxesRequest) returns (ListSandboxesResponse);
  rpc StopSandbox(StopSandboxRequest) returns (StopSandboxResponse);
  rpc DeleteSandbox(DeleteSandboxRequest) returns (DeleteSandboxResponse);
  rpc EnsureSandboxRunning(EnsureSandboxRunningRequest) returns (EnsureSandboxRunningResponse);
  rpc UpdateSandboxLastSession(UpdateSandboxLastSessionRequest) returns (UpdateSandboxLastSessionResponse);

  // --- Agent Instances ---
  rpc CreateInstance(CreateInstanceRequest) returns (CreateInstanceResponse);
  rpc GetInstance(GetInstanceRequest) returns (GetInstanceResponse);
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse);
  rpc PauseInstance(PauseInstanceRequest) returns (PauseInstanceResponse);
  rpc ResumeInstance(ResumeInstanceRequest) returns (ResumeInstanceResponse);
  rpc DeleteInstance(DeleteInstanceRequest) returns (DeleteInstanceResponse);

  // --- Instance Inbox ---
  rpc WriteInboxItem(WriteInboxItemRequest) returns (WriteInboxItemResponse);
  // Internal-only: called by Threads after thread authorization and participant resolution.
  rpc FanoutInboxItem(FanoutInboxItemRequest) returns (FanoutInboxItemResponse);
  rpc GetUnackedInboxItems(GetUnackedInboxItemsRequest) returns (GetUnackedInboxItemsResponse);
  rpc AckInboxItems(AckInboxItemsRequest) returns (AckInboxItemsResponse);
  rpc GetUnackedInboxCount(GetUnackedInboxCountRequest) returns (GetUnackedInboxCountResponse);

  // --- Volumes ---
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);
  rpc GetVolume(GetVolumeRequest) returns (GetVolumeResponse);
  rpc UpdateVolume(UpdateVolumeRequest) returns (UpdateVolumeResponse);
  rpc DeleteVolume(DeleteVolumeRequest) returns (DeleteVolumeResponse);
  rpc ListVolumes(ListVolumesRequest) returns (ListVolumesResponse);

  // --- Volume Attachments (no Update) ---
  rpc CreateVolumeAttachment(CreateVolumeAttachmentRequest) returns (CreateVolumeAttachmentResponse);
  rpc GetVolumeAttachment(GetVolumeAttachmentRequest) returns (GetVolumeAttachmentResponse);
  rpc DeleteVolumeAttachment(DeleteVolumeAttachmentRequest) returns (DeleteVolumeAttachmentResponse);
  rpc ListVolumeAttachments(ListVolumeAttachmentsRequest) returns (ListVolumeAttachmentsResponse);

  // --- MCPs ---
  rpc CreateMcp(CreateMcpRequest) returns (CreateMcpResponse);
  rpc GetMcp(GetMcpRequest) returns (GetMcpResponse);
  rpc UpdateMcp(UpdateMcpRequest) returns (UpdateMcpResponse);
  rpc DeleteMcp(DeleteMcpRequest) returns (DeleteMcpResponse);
  rpc ListMcps(ListMcpsRequest) returns (ListMcpsResponse);

  // --- Skills ---
  rpc CreateSkill(CreateSkillRequest) returns (CreateSkillResponse);
  rpc GetSkill(GetSkillRequest) returns (GetSkillResponse);
  rpc UpdateSkill(UpdateSkillRequest) returns (UpdateSkillResponse);
  rpc DeleteSkill(DeleteSkillRequest) returns (DeleteSkillResponse);
  rpc ListSkills(ListSkillsRequest) returns (ListSkillsResponse);

  // --- Hooks ---
  rpc CreateHook(CreateHookRequest) returns (CreateHookResponse);
  rpc GetHook(GetHookRequest) returns (GetHookResponse);
  rpc UpdateHook(UpdateHookRequest) returns (UpdateHookResponse);
  rpc DeleteHook(DeleteHookRequest) returns (DeleteHookResponse);
  rpc ListHooks(ListHooksRequest) returns (ListHooksResponse);

  // --- Envs ---
  rpc CreateEnv(CreateEnvRequest) returns (CreateEnvResponse);
  rpc GetEnv(GetEnvRequest) returns (GetEnvResponse);
  rpc UpdateEnv(UpdateEnvRequest) returns (UpdateEnvResponse);
  rpc DeleteEnv(DeleteEnvRequest) returns (DeleteEnvResponse);
  rpc ListEnvs(ListEnvsRequest) returns (ListEnvsResponse);

  // --- Init Scripts ---
  rpc CreateInitScript(CreateInitScriptRequest) returns (CreateInitScriptResponse);
  rpc GetInitScript(GetInitScriptRequest) returns (GetInitScriptResponse);
  rpc UpdateInitScript(UpdateInitScriptRequest) returns (UpdateInitScriptResponse);
  rpc DeleteInitScript(DeleteInitScriptRequest) returns (DeleteInitScriptResponse);
  rpc ListInitScripts(ListInitScriptsRequest) returns (ListInitScriptsResponse);

  // --- Image Pull Secret Attachments (no Update - immutable) ---
  rpc CreateImagePullSecretAttachment(CreateImagePullSecretAttachmentRequest) returns (CreateImagePullSecretAttachmentResponse);
  rpc GetImagePullSecretAttachment(GetImagePullSecretAttachmentRequest) returns (GetImagePullSecretAttachmentResponse);
  rpc DeleteImagePullSecretAttachment(DeleteImagePullSecretAttachmentRequest) returns (DeleteImagePullSecretAttachmentResponse);
  rpc ListImagePullSecretAttachments(ListImagePullSecretAttachmentsRequest) returns (ListImagePullSecretAttachmentsResponse);
}

// ===========================================================================
// Common
// ===========================================================================

// Metadata shared by every agent resource.
message EntityMeta {
  string id = 1; // UUID
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
}

// Kubernetes-style container resource requests and limits.
message ComputeResources {
  string requests_cpu = 1;
  string requests_memory = 2;
  string limits_cpu = 3;
  string limits_memory = 4;
}

enum AgentAvailability {
  AGENT_AVAILABILITY_UNSPECIFIED = 0;
  AGENT_AVAILABILITY_INTERNAL = 1;
  AGENT_AVAILABILITY_PRIVATE = 2;
}

enum AgentRole {
  AGENT_ROLE_UNSPECIFIED = 0;
  AGENT_ROLE_OWNER = 1;
  AGENT_ROLE_MAINTAINER = 2;
  AGENT_ROLE_PARTICIPANT = 3;
}

enum AgentInstanceState {
  AGENT_INSTANCE_STATE_UNSPECIFIED = 0;
  AGENT_INSTANCE_STATE_ACTIVE = 1;
  AGENT_INSTANCE_STATE_PAUSED = 2;
  AGENT_INSTANCE_STATE_TERMINATED = 3;
}

enum InboxItemSourceKind {
  INBOX_ITEM_SOURCE_KIND_UNSPECIFIED = 0;
  INBOX_ITEM_SOURCE_KIND_THREAD = 1;
  INBOX_ITEM_SOURCE_KIND_DIRECT = 2;
}

// ===========================================================================
// Agent
// ===========================================================================

message Agent {
  EntityMeta meta = 1;
  string name = 2;
  string role = 3;
  string model = 4; // UUID
  string description = 5;
  string configuration = 6;
  string image = 7;
  ComputeResources resources = 8;
  string init_image = 9;
  string organization_id = 10;
  string nickname = 11;
  optional string idle_timeout = 12; // Go duration string (e.g., "30s", "5m", "1h").
  // Capabilities supported by this agent. Free-form strings (e.g., "privileged", "dind").
  repeated string capabilities = 13;
  AgentAvailability availability = 14;
}

message CreateAgentRequest {
  string name = 1;
  string role = 2;
  string model = 3; // UUID
  string description = 4;
  string configuration = 5;
  string image = 6;
  ComputeResources resources = 7;
  string organization_id = 8;
  string init_image = 9;
  string nickname = 10;
  optional string idle_timeout = 11; // Go duration string (e.g., "30s", "5m", "1h").
  // Capabilities supported by this agent. Free-form strings (e.g., "privileged", "dind").
  repeated string capabilities = 12;
  AgentAvailability availability = 13;
}

message CreateAgentResponse {
  Agent agent = 1;
}

message GetAgentRequest {
  string id = 1; // UUID
}

message GetAgentResponse {
  Agent agent = 1;
}

message ResolveAgentIdentityRequest {
  string identity_id = 1;
}

message ResolveAgentIdentityResponse {
  // Agent class ID for class identities and the owning class ID for instance identities.
  string agent_id = 1;
  string organization_id = 2;
  // Set only when identity_id resolves to an agent_instance identity.
  optional string agent_instance_id = 3;
}

message UpdateAgentRequest {
  string id = 1; // UUID
  optional string name = 2;
  optional string role = 3;
  optional string model = 4;
  optional string description = 5;
  optional string configuration = 6;
  optional string image = 7;
  optional ComputeResources resources = 8;
  optional string init_image = 9;
  optional string nickname = 10;
  optional string idle_timeout = 11; // Go duration string (e.g., "30s", "5m", "1h").
  // Capabilities replace the existing list; an empty list clears all capabilities.
  repeated string capabilities = 12;
  optional AgentAvailability availability = 13;
}

message UpdateAgentResponse {
  Agent agent = 1;
}

message DeleteAgentRequest {
  string id = 1; // UUID
}

message DeleteAgentResponse {}

message ListAgentsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string organization_id = 3;
}

message ListAgentsResponse {
  repeated Agent agents = 1;
  string next_page_token = 2;
}

message AgentRoleAssignment {
  string agent_id = 1; // UUID
  string identity_id = 2; // UUID
  AgentRole role = 3;
}

message SetAgentRoleRequest {
  string agent_id = 1; // UUID
  string identity_id = 2; // UUID
  AgentRole role = 3;
}

message SetAgentRoleResponse {
  AgentRoleAssignment assignment = 1;
}

message RemoveAgentRoleRequest {
  string agent_id = 1; // UUID
  string identity_id = 2; // UUID
}

message RemoveAgentRoleResponse {}

message ListAgentRolesRequest {
  string agent_id = 1; // UUID
}

message ListAgentRolesResponse {
  repeated AgentRoleAssignment assignments = 1;
}

message ListMyAgentRolesRequest {
  string organization_id = 1; // UUID
}

message ListMyAgentRolesResponse {
  repeated AgentRoleAssignment assignments = 1;
}

// ===========================================================================
// Agent Instance
// ===========================================================================

message AgentInstance {
  EntityMeta meta = 1;
  string agent_id = 2; // UUID of the agent class.
  string organization_id = 3; // UUID
  // User-chosen suffix, when explicitly supplied at creation time.
  optional string label = 4;
  // Effective handle suffix without leading #. Generated when label is unset.
  string suffix = 5;
  AgentInstanceState state = 6;
  optional string pause_reason = 7;
  google.protobuf.Timestamp last_activity_at = 8;
  // Class handle stem without leading @.
  string nickname = 9;
  // Full instance handle in @nickname#suffix form.
  string handle = 10;
}

message CreateInstanceRequest {
  string agent_id = 1; // UUID of the agent class.
  // Optional user-chosen handle suffix without leading #.
  optional string label = 2;
}

message CreateInstanceResponse {
  AgentInstance instance = 1;
}

message GetInstanceRequest {
  string id = 1; // UUID
}

message GetInstanceResponse {
  AgentInstance instance = 1;
}

message ListInstancesRequest {
  int32 page_size = 1;
  string page_token = 2;
  string organization_id = 3; // UUID
  optional string agent_id = 4; // UUID of the agent class.
  repeated AgentInstanceState state_in = 5;
  // When set, filters to instances that do or do not have unacked inbox items.
  optional bool has_unacked = 6;
}

message ListInstancesResponse {
  repeated AgentInstance instances = 1;
  string next_page_token = 2;
}

message PauseInstanceRequest {
  string id = 1; // UUID
  string pause_reason = 2;
}

message PauseInstanceResponse {
  AgentInstance instance = 1;
}

message ResumeInstanceRequest {
  string id = 1; // UUID
}

message ResumeInstanceResponse {
  AgentInstance instance = 1;
}

message DeleteInstanceRequest {
  string id = 1; // UUID
}

message DeleteInstanceResponse {
  AgentInstance instance = 1;
}

// ===========================================================================
// Instance Inbox
// ===========================================================================

message InboxItem {
  string id = 1; // UUID
  string agent_instance_id = 2; // UUID
  InboxItemSourceKind source_kind = 3;
  // Set only when source_kind is INBOX_ITEM_SOURCE_KIND_THREAD.
  optional string thread_id = 4; // UUID
  // Set only when source_kind is INBOX_ITEM_SOURCE_KIND_THREAD.
  optional string message_id = 5; // UUID
  string sender_id = 6; // Identity UUID
  string body = 7;
  repeated string file_ids = 8; // UUIDs
  google.protobuf.Timestamp accepted_at = 9;
  optional google.protobuf.Timestamp acked_at = 10;
}

message WriteInboxItemRequest {
  string agent_instance_id = 1; // UUID
  string sender_id = 2; // Identity UUID
  string body = 3;
  repeated string file_ids = 4; // UUIDs
}

message WriteInboxItemResponse {
  InboxItem item = 1;
}

message FanoutInboxItemRequest {
  string agent_instance_id = 1; // UUID
  string thread_id = 2; // UUID
  string message_id = 3; // UUID
  string sender_id = 4; // Identity UUID
  string body = 5;
  repeated string file_ids = 6; // UUIDs
}

message FanoutInboxItemResponse {
  InboxItem item = 1;
}

message GetUnackedInboxItemsRequest {
  string agent_instance_id = 1; // UUID
  int32 page_size = 2;
  string page_token = 3;
}

message GetUnackedInboxItemsResponse {
  repeated InboxItem items = 1;
  string next_page_token = 2;
}

message AckInboxItemsRequest {
  string agent_instance_id = 1; // UUID
  repeated string item_ids = 2; // UUIDs
}

message AckInboxItemsResponse {
  int32 acked_count = 1;
}

message GetUnackedInboxCountRequest {
  string agent_instance_id = 1; // UUID
  optional string thread_id = 2; // UUID
}

message GetUnackedInboxCountResponse {
  int32 count = 1;
}

// ===========================================================================
// Environment
// ===========================================================================

message Environment {
  EntityMeta meta = 1;
  string organization_id = 2;
  string name = 3;
  string flavor_id = 4;
  string image = 5;
  string flavor_name = 6;
}

message CreateEnvironmentRequest {
  string organization_id = 1;
  string name = 2;
  string flavor_id = 3;
  string image = 4;
}

message CreateEnvironmentResponse {
  Environment environment = 1;
}

message GetEnvironmentRequest {
  string id = 1; // UUID
}

message GetEnvironmentResponse {
  Environment environment = 1;
}

message UpdateEnvironmentRequest {
  string id = 1; // UUID
  optional string name = 2;
  optional string flavor_id = 3;
  optional string image = 4;
}

message UpdateEnvironmentResponse {
  Environment environment = 1;
}

message DeleteEnvironmentRequest {
  string id = 1; // UUID
}

message DeleteEnvironmentResponse {}

message ListEnvironmentsRequest {
  int32 page_size = 1;
  string page_token = 2;
  string organization_id = 3;
}

message ListEnvironmentsResponse {
  repeated Environment environments = 1;
  string next_page_token = 2;
}

// ===========================================================================
// Sandbox
// ===========================================================================

enum SandboxStatus {
  SANDBOX_STATUS_UNSPECIFIED = 0;
  SANDBOX_STATUS_STARTING = 1;
  SANDBOX_STATUS_RUNNING = 2;
  SANDBOX_STATUS_STOPPED = 3;
  SANDBOX_STATUS_FAILED = 4;
  SANDBOX_STATUS_TERMINATED = 5;
}

message Sandbox {
  EntityMeta meta = 1;
  string organization_id = 2;
  string name = 3;
  string environment_id = 4;
  string owner_id = 5;
  SandboxStatus status = 6;
  string idle_timeout = 7;
  string ttl = 8;
  optional google.protobuf.Timestamp last_session_at = 9;
  string environment_name = 10;
  optional string workload_id = 11;
}

message CreateSandboxRequest {
  string organization_id = 1;
  optional string name = 2;
  string environment_id = 3;
  string owner_id = 4;
}

message CreateSandboxResponse {
  Sandbox sandbox = 1;
}

message GetSandboxRequest {
  oneof ref {
    string id = 1;
    SandboxNameRef name = 2;
  }
}

message SandboxNameRef {
  string organization_id = 1;
  string name = 2;
}

message GetSandboxResponse {
  Sandbox sandbox = 1;
}

message ListSandboxesRequest {
  int32 page_size = 1;
  string page_token = 2;
  string organization_id = 3;
  optional string owner_id = 4;
  bool include_terminated = 5;
}

message ListSandboxesResponse {
  repeated Sandbox sandboxes = 1;
  string next_page_token = 2;
}

message StopSandboxRequest {
  string id = 1;
}

message StopSandboxResponse {
  Sandbox sandbox = 1;
}

message DeleteSandboxRequest {
  string id = 1;
}

message DeleteSandboxResponse {
  Sandbox sandbox = 1;
}

message EnsureSandboxRunningRequest {
  string id = 1;
}

message EnsureSandboxRunningResponse {
  Sandbox sandbox = 1;
}

message UpdateSandboxLastSessionRequest {
  string id = 1;
  google.protobuf.Timestamp last_session_at = 2;
}

message UpdateSandboxLastSessionResponse {
  Sandbox sandbox = 1;
}

