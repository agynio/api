get:
  tags: [LLM Models]
  summary: Get LLM model by ID
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Model.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
patch:
  tags: [LLM Models]
  summary: Update LLM model (partial)
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/ModelUpdateRequest.yaml'
  responses:
    '200':
      description: Updated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Model.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
delete:
  tags: [LLM Models]
  summary: Delete LLM model
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '204':
      description: No Content
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
