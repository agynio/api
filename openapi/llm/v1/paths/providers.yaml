get:
  tags: [LLM Providers]
  summary: List LLM providers
  parameters:
    - in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    - in: query
      name: perPage
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PaginatedLLMProviders.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
post:
  tags: [LLM Providers]
  summary: Create LLM provider
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/LLMProviderCreateRequest.yaml'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/LLMProvider.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
