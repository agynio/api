post:
  tags: [LLM Responses]
  summary: Proxy LLM response
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            model_id: { type: string, format: uuid }
          required: [model_id]
          additionalProperties: true
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
        text/event-stream:
          schema:
            type: string
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
