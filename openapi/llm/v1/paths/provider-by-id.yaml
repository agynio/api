get:
  tags: [LLM Providers]
  summary: Get LLM provider by ID
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/LLMProvider.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
patch:
  tags: [LLM Providers]
  summary: Update LLM provider (partial)
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/LLMProviderUpdateRequest.yaml'
  responses:
    '200':
      description: Updated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/LLMProvider.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
delete:
  tags: [LLM Providers]
  summary: Delete LLM provider
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '204':
      description: No Content
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
