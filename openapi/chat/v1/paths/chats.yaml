get:
  operationId: getChats
  tags: [Chats]
  summary: List chats
  description: >-
    List chats for the authenticated user with cursor-based pagination.
  parameters:
    - in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Maximum number of chats to return.
    - in: query
      name: pageToken
      schema:
        type: string
      description: Opaque cursor from a previous response's nextPageToken.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PaginatedChats.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
post:
  operationId: createChat
  tags: [Chats]
  summary: Create chat
  description: >-
    Create a new chat thread. The authenticated user is automatically
    added as a participant.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/ChatCreateRequest.yaml'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Chat.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
