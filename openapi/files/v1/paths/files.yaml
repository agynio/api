post:
  tags: [Files]
  summary: Upload file
  description: Upload a file using multipart form data.
  operationId: uploadFile
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            file:
              type: string
              format: binary
          required: [file]
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/File.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
