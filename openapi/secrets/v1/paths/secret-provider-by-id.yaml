get:
  tags: [SecretProviders]
  summary: Get secret provider by ID
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/SecretProvider.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
patch:
  tags: [SecretProviders]
  summary: Update secret provider (partial)
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/SecretProviderUpdateRequest.yaml'
  responses:
    '200':
      description: Updated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/SecretProvider.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
delete:
  tags: [SecretProviders]
  summary: Delete secret provider
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '204':
      description: No Content
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
