get:
  tags: [Secrets]
  summary: List secrets
  parameters:
    - in: query
      name: secretProviderId
      schema:
        type: string
        format: uuid
    - in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    - in: query
      name: perPage
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PaginatedSecrets.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
post:
  tags: [Secrets]
  summary: Create secret
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/SecretCreateRequest.yaml'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Secret.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
