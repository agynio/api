get:
  tags: [Volumes]
  summary: List volumes
  parameters:
    - in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - in: query
      name: pageToken
      schema:
        type: string
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PaginatedVolumes.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
post:
  tags: [Volumes]
  summary: Create volume
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/VolumeCreateRequest.yaml'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Volume.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
