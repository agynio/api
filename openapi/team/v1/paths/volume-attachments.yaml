get:
  tags: [Volume Attachments]
  summary: List volume attachments
  parameters:
    - in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - in: query
      name: pageToken
      schema:
        type: string
    - in: query
      name: volumeId
      schema:
        type: string
        format: uuid
    - in: query
      name: agentId
      schema:
        type: string
        format: uuid
    - in: query
      name: mcpId
      schema:
        type: string
        format: uuid
    - in: query
      name: hookId
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PaginatedVolumeAttachments.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
post:
  tags: [Volume Attachments]
  summary: Create volume attachment
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/VolumeAttachmentCreateRequest.yaml'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/VolumeAttachment.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
