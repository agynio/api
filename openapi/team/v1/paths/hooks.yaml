get:
  tags: [Hooks]
  summary: List hooks
  parameters:
    - in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - in: query
      name: pageToken
      schema:
        type: string
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PaginatedHooks.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
post:
  tags: [Hooks]
  summary: Create hook
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/HookCreateRequest.yaml'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Hook.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
