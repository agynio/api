get:
  tags: [Variables]
  summary: Resolve variable by key
  parameters:
    - in: path
      name: key
      required: true
      schema:
        type: string
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              value:
                type: string
                description: Only present when found is true.
              found: { type: boolean }
            required: [found]
            additionalProperties: false
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
