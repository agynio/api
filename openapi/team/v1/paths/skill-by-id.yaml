get:
  tags: [Skills]
  summary: Get skill by ID
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Skill.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
patch:
  tags: [Skills]
  summary: Update skill (partial)
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/SkillUpdateRequest.yaml'
  responses:
    '200':
      description: Updated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Skill.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
delete:
  tags: [Skills]
  summary: Delete skill
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '204':
      description: No Content
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
