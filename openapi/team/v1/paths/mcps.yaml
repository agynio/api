get:
  tags: [MCPs]
  summary: List MCPs
  parameters:
    - in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - in: query
      name: pageToken
      schema:
        type: string
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PaginatedMcps.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
post:
  tags: [MCPs]
  summary: Create MCP
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/McpCreateRequest.yaml'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Mcp.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
