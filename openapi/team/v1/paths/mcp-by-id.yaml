get:
  tags: [MCPs]
  summary: Get MCP by ID
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Mcp.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
patch:
  tags: [MCPs]
  summary: Update MCP (partial)
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/McpUpdateRequest.yaml'
  responses:
    '200':
      description: Updated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Mcp.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
delete:
  tags: [MCPs]
  summary: Delete MCP
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '204':
      description: No Content
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
