get:
  tags: [Volume Attachments]
  summary: Get volume attachment by ID
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/VolumeAttachment.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
delete:
  tags: [Volume Attachments]
  summary: Delete volume attachment
  parameters:
    - $ref: '../components/parameters/IdPath.yaml'
  responses:
    '204':
      description: No Content
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
