get:
  tags: [Variables]
  summary: List variables
  parameters:
    - in: query
      name: q
      schema:
        type: string
      description: Free-text search (key/description).
    - in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    - in: query
      name: perPage
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../components/schemas/PaginatedVariables.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
post:
  tags: [Variables]
  summary: Create variable
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/VariableCreateRequest.yaml'
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../components/schemas/Variable.yaml'
    default:
      $ref: '../components/responses/ProblemResponse.yaml'
