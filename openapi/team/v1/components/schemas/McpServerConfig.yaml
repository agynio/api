type: object
properties:
  namespace: { type: string }
  command: { type: string }
  workdir: { type: string }
  env:
    type: array
    items: { $ref: './McpEnvItem.yaml' }
  requestTimeoutMs: { type: integer, minimum: 1 }
  startupTimeoutMs: { type: integer, minimum: 1 }
  heartbeatIntervalMs: { type: integer, minimum: 1 }
  staleTimeoutMs: { type: integer, minimum: 0 }
  restart:
    type: object
    properties:
      maxAttempts: { type: integer, minimum: 1 }
      backoffMs: { type: integer, minimum: 1 }
    additionalProperties: false
  toolFilter:
    type: object
    properties:
      mode:
        type: string
        enum: [allow, deny]
      rules:
        type: array
        items:
          type: object
          properties:
            pattern: { type: string, minLength: 1 }
          required: [pattern]
          additionalProperties: false
    required: [mode]
    additionalProperties: false
additionalProperties: false
